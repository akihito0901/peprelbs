            // Image Resizer Helper
            const resizeImage = (file) => {
                return new Promise((resolve) => {
                    const MAX_WIDTH = 600;
                    const MAX_HEIGHT = 600;
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            let width = img.width;
                            let height = img.height;

                            if (width > height) {
                                if (width > MAX_WIDTH) {
                                    height *= MAX_WIDTH / width;
                                    width = MAX_WIDTH;
                                }
                            } else {
                                if (height > MAX_HEIGHT) {
                                    width *= MAX_HEIGHT / height;
                                    height = MAX_HEIGHT;
                                }
                            }

                            const canvas = document.createElement('canvas');
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            // Compress to JPEG 0.8
                            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                            resolve(dataUrl);
                        };
                    };
                });
            };

                return new Promise((resolve) => {
                    const MAX_WIDTH = 1000;
                    const MAX_HEIGHT = 1000;
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            let width = img.width; let height = img.height;
                            if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } }
                            else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                            const canvas = document.createElement('canvas');
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            // Compress to JPEG 0.8

                            </div>

                            <div className="space-y-2">
                                <h3 className="font-bold text-theme-text text-sm border-l-4 border-theme-secondary pl-2 mb-3">カフェ情報</h3>
                                <p className="text-sm text-theme-text leading-relaxed whitespace-pre-wrap">{cafe.desc}</p>
                            </div>
                        </div>

                        {/* Action Buttons */}
                        <div className="absolute bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur border-t border-theme-muted z-20 flex gap-2 sm:gap-3">
                            <button onClick={onClose} className="py-4 px-4 sm:px-6 text-theme-text bg-theme-muted/30 rounded-xl font-bold text-xs sm:text-sm whitespace-nowrap">
                                閉じる
                            </button>
                            <button onClick={onEdit} className="py-4 px-4 sm:px-6 text-theme-primary bg-theme-primary/20 rounded-xl font-bold text-xs sm:text-sm whitespace-nowrap">
                                編集する
                            </button>
                            <button onClick={onOpenMap} className="flex-1 py-4 text-white rounded-xl shadow-lg font-bold tracking-widest bg-theme-secondary flex justify-center items-center gap-1 sm:gap-2 text-xs sm:text-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-4 h-4 sm:w-5 sm:h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" /></svg>
                                Mapで見る
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const CafeSubmitModal = ({ onClose, initialData }) => {
            const [formData, setFormData] = useState(
                initialData || { name: '', pref: '', city: '', address: '', desc: '', img: '' }
            );
            const [isSubmitting, setIsSubmitting] = useState(false);

            const resizeImage = (file) => {
                return new Promise((resolve) => {
                    const MAX_WIDTH = 800; // slightly larger for locations
                    const MAX_HEIGHT = 800;
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            let width = img.width;
                            let height = img.height;
                            if (width > height) {
                                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                            } else {
                                if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                            }
                            const canvas = document.createElement('canvas');
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.8));
                        };
                    };
                });
            };

            const handleImage = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    setIsSubmitting(true); // show generic processing
                    const resized = await resizeImage(file);
                    setFormData({ ...formData, img: resized });
                    setIsSubmitting(false);
                }
            };

            const handleSubmit = async () => {
                if (!formData.name || !formData.pref || !formData.address) {
                    alert('必須項目（店名・県・住所）を入力してください。');
                    return;
                }
                setIsSubmitting(true);
                try {
                    if (initialData && initialData.id) {
                        // Use set with merge: true so that if it's a hardcoded ID that doesn't exist in Firestore yet, it gets created.
                        await db.collection('shared_cafes').doc(initialData.id).set({
                            name: formData.name,
                            pref: formData.pref,
                            city: formData.city,
                            address: formData.address,
                            desc: formData.desc,
                            img: formData.img,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        }, { merge: true });
                    } else {
                        // Create new completely
                        await db.collection('shared_cafes').add({
                            ...formData,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                    onClose();
                } catch (e) {
                    alert('保存に失敗しました');
                    console.error(e);
                }
                setIsSubmitting(false);
            };

            return (
                <div className="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-end justify-center">
                    <div className="bg-theme-base w-full max-w-md h-[90vh] rounded-t-3xl flex flex-col overflow-hidden relative mt-16">
                        {/* Header */}
                        <div className="p-4 border-b border-theme-muted flex justify-between items-center bg-white shrink-0 shadow-sm z-50 rounded-t-3xl">
                            <h3 className="font-serif text-lg text-theme-text font-bold">{initialData ? 'お店を編集' : 'お店を登録'}</h3>
                            <button onClick={onClose} className="p-2 rounded-full text-theme-text bg-theme-muted/20 hover:bg-theme-muted/50 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-6 h-6"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                            </button>
                        </div>

                        {/* Form Body */}
                        <div className="flex-1 overflow-y-auto p-6 space-y-6 pb-32 bg-theme-base">
                            {/* Image Upload */}
                            <div>
                                <label className="block text-xs font-bold text-theme-text mb-2">カフェの写真 <span className="text-[10px] font-normal text-theme-primary ml-2 border border-theme-primary/30 px-1 rounded">任意</span></label>
                                <label className="relative w-full h-48 bg-theme-muted/50 border-2 border-dashed border-theme-primary/40 rounded-2xl flex flex-col items-center justify-center cursor-pointer overflow-hidden group">
                                    {formData.img ? (
                                        <img loading="lazy" src={formData.img} className="w-full h-full object-cover" />
                                    ) : (
                                        <div className="text-theme-primary flex flex-col items-center">
                                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-8 h-8 mb-2"><path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" /></svg>
                                            <span className="text-xs font-bold">タップして写真を選択</span>
                                        </div>
                                    )}
                                    <div className="absolute inset-0 bg-black/20 flex items-center justify-center opacity-0">
                                        <span className="text-xs text-white font-bold bg-black/50 px-3 py-1 rounded-full">CHANGE</span>
                                    </div>
                                    <input type="file" accept="image/*" className="hidden" onChange={handleImage} />
                                </label>
                            </div>

                            {/* Inputs */}
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-xs font-bold text-theme-text mb-1">店名 *</label>
                                    <input type="text" value={formData.name} onChange={e => setFormData({ ...formData, name: e.target.value })} className="w-full p-3 rounded-xl bg-white border outline-none text-theme-text input-underline" placeholder="例: パークサイドカフェ 犬の家" />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-xs font-bold text-theme-text mb-1">都道府県 *</label>
                                        <select value={formData.pref} onChange={e => setFormData({ ...formData, pref: e.target.value })} className="w-full p-3 rounded-xl bg-white border outline-none text-theme-text input-underline">
                                            <option value="">選択してください</option>
                                            {REGIONS.filter(r => r.id !== 'all').flatMap(r => r.prefs).map(p => (
                                                <option key={p} value={p}>{p}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-theme-text mb-1">市区町村</label>
                                        <input type="text" value={formData.city} onChange={e => setFormData({ ...formData, city: e.target.value })} className="w-full p-3 rounded-xl bg-white border outline-none text-theme-text input-underline" placeholder="例: 横浜市" />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-theme-text mb-1">詳細な住所 * (GoogleMap検索用)</label>
                                    <input type="text" value={formData.address} onChange={e => setFormData({ ...formData, address: e.target.value })} className="w-full p-3 rounded-xl bg-white border outline-none text-theme-text input-underline" placeholder="神奈川県横浜市中区..." />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-theme-text mb-1">おすすめポイントなど</label>
                                    <textarea value={formData.desc} onChange={e => setFormData({ ...formData, desc: e.target.value })} className="w-full p-3 rounded-xl bg-white border outline-none text-theme-text input-underline h-24 resize-none" placeholder="大型犬もOKです！など"></textarea>
                                </div>
                            </div>
                        </div>

                        {/* Submit Button (Sticky Bottom) */}
                        <div className="absolute bottom-0 left-0 right-0 p-4 bg-white border-t border-theme-muted z-20">
                            <button onClick={handleSubmit} disabled={isSubmitting} className={`w-full py-4 text-white rounded-xl shadow-lg font-serif font-bold tracking-widest ${isSubmitting ? 'bg-gray-400' : 'bg-theme-secondary hover:brightness-110 active:scale-95 transition-all'}`}>
                                {isSubmitting ? '処理中...' : (initialData ? '変更を保存する' : '登録する')}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };




        // --- MAIN ENTRY POINT ---
        // --- UTILS & GUARDS ---
        const AppBrowserGuard = ({ children }) => {
            const [isInApp, setIsInApp] = useState(false);
            const [isAndroid, setIsAndroid] = useState(false);

            useEffect(() => {
                const ua = navigator.userAgent || navigator.vendor || window.opera;
                const isInstagram = ua.indexOf('Instagram') > -1;
                const isLine = ua.indexOf('Line') > -1;
                const isFB = ua.indexOf('FBAN') > -1 || ua.indexOf('FBAV') > -1;

                if (isInstagram || isLine || isFB) {
                    setIsInApp(true);
                    const android = /android/i.test(ua);
                    setIsAndroid(android);

                    if (android) {
                        // Android Auto-Redirect attempt
                        const url = window.location.href;
                        const packageUrl = url.replace(/^https?:\/\//, '');
                        const intent = `intent://${packageUrl}#Intent;scheme=https;package=com.android.chrome;end`;
                        window.location.href = intent;
                    }
                }
            }, []);

            if (isInApp && !isAndroid) {
                return (
                    <div className="fixed inset-0 z-[100] bg-black/80 flex flex-col items-center justify-center p-6 text-white text-center">
                        <div className="absolute top-4 right-4">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-10 h-10"><path strokeLinecap="round" strokeLinejoin="round" d="M4.5 19.5l15-15m0 0H8.25m11.25 0v11.25" /></svg>
                        </div>
                        <h2 className="text-xl font-bold mb-4 font-serif">ブラウザで開いてください</h2>
                        <p className="text-sm opacity-80 mb-6">Instagram/LINE等のアプリ内ブラウザでは<br />正常に動作しない場合があります。</p>
                        <div className="bg-white/10 p-4 rounded-xl border border-white/20 text-xs text-left inline-block">
                            <p className="mb-2">1. 右上（または右下）のメニュー <span className="inline-block align-middle"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M6.75 12a.75.75 0 11-1.5 0 .75.75 0 011.5 0zM12.75 12a.75.75 0 11-1.5 0 .75.75 0 011.5 0zM18.75 12a.75.75 0 11-1.5 0 .75.75 0 011.5 0z" /></svg></span> をタップ</p>
                            <p>2. <span className="font-bold text-theme-secondary">「ブラウザで開く」</span>を選択</p>
                        </div>
                        <button onClick={() => setIsInApp(false)} className="mt-8 text-xs text-white/50 underline">
                            このまま進む (非推奨)
                        </button>
                    </div>
                );
            }

            return children;
        };

        const App = () => {
            const [user, setUser] = useState(null); // Auth User Object
            const [isLoading, setIsLoading] = useState(true); // Initial Check

            // Auth Persistence Logic
            useEffect(() => {
                if (typeof firebase === 'undefined') return;

                // Infinite persistence (default in Firebase w/ CDN, but explicit here doesn't hurt)
                // firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);

                const unsubscribe = firebase.auth().onAuthStateChanged((u) => {
                    setUser(u); // If logged in, u object exists. If not, null.
                    setIsLoading(false); // Auth check done
                });
                return () => unsubscribe();
            }, []);

            const handleLogin = () => {
                if (typeof firebase === 'undefined') {
                    alert("Firebase SDK not loaded. Check internet connection.");
                    return;
                }
                const auth = firebase.auth();
                const provider = new firebase.auth.GoogleAuthProvider();

                auth.signInWithPopup(provider).catch((error) => {
                    console.error("Login failed", error);
                    alert(`Login Failed: ${error.message}`);
                });
            };

            const handleLogout = () => {
                firebase.auth().signOut();
            };

            if (isLoading) {
                return (
                    <div className="w-full max-w-md mx-auto min-h-screen bg-theme-base flex items-center justify-center">
                        <div className="text-theme-primary font-serif">Loading PePre...</div>
                    </div>
                );
            }

            return (
                <div className="w-full max-w-md mx-auto shadow-2xl min-h-screen bg-theme-base overflow-hidden relative">
                    {user ? <Dashboard user={user} onLogout={handleLogout} /> : <LandingPage onLogin={handleLogin} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppBrowserGuard><App /></AppBrowserGuard>);
    </script>
</body>

</html>
